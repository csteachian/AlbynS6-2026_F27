<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albyn School Scavenger Hunt - F27</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&amp;family=Nunito:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
      50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.8); }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100%) rotate(720deg); opacity: 0; }
    }
    .float-animation { animation: float 3s ease-in-out infinite; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confetti-fall 3s linear forwards;
    }
    .shake {
      animation: shake 0.5s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="w-full h-full overflow-auto" style="background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 50%, #1b263b 100%);">
   <!-- Confetti container -->
   <div id="confetti-container" class="fixed inset-0 pointer-events-none overflow-hidden z-50"></div>
   <div class="min-h-full flex flex-col items-center justify-center p-6">
    <!-- Main Card -->
    <div class="w-full max-w-md">
     <!-- Header -->
     <div class="text-center mb-6">
      <div class="inline-block float-animation">
       <svg class="w-16 h-16 mx-auto mb-2" viewbox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="28" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" /> <text x="32" y="40" text-anchor="middle" font-size="28" fill="#1e3a5f">
         🔍
        </text>
       </svg>
      </div>
      <h1 id="page-title" class="text-4xl font-bold text-amber-400" style="font-family: 'Bangers', cursive; letter-spacing: 2px; text-shadow: 3px 3px 0 #0d1b2a;">Scavenger Hunt</h1>
     </div><!-- Clue Card -->
     <div class="bg-slate-800/80 backdrop-blur rounded-2xl p-6 shadow-2xl border-2 border-amber-500/30">
      <!-- Clue Badge -->
      <div class="flex justify-center mb-4">
       <span id="clue-label" class="bg-amber-500 text-slate-900 px-4 py-1 rounded-full text-sm font-bold uppercase tracking-wider" style="font-family: 'Nunito', sans-serif;"> Clue #1 </span>
      </div><!-- Clue Text -->
      <div class="bg-slate-900/60 rounded-xl p-5 mb-6 border border-slate-700">
       <p id="clue-text" class="text-2xl text-center text-cyan-300 font-bold tracking-wider" style="font-family: 'Nunito', sans-serif; text-shadow: 0 0 10px rgba(103, 232, 249, 0.5);">I AM AND IN REVERSE</p>
      </div><!-- Answer Input -->
      <div class="space-y-4">
       <label for="answer-input" class="block text-slate-300 text-sm font-semibold mb-2" style="font-family: 'Nunito', sans-serif;"> Enter your answer: </label>
       <div class="relative">
        <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off" class="w-full px-4 py-3 bg-slate-900 border-2 border-slate-600 rounded-xl text-white text-lg focus:outline-none focus:border-amber-400 transition-colors placeholder-slate-500" style="font-family: 'Nunito', sans-serif;"> <button id="submit-btn" class="absolute right-2 top-1/2 -translate-y-1/2 bg-amber-500 hover:bg-amber-400 text-slate-900 px-4 py-2 rounded-lg font-bold transition-all hover:scale-105" style="font-family: 'Nunito', sans-serif;"> Check </button>
       </div><!-- Feedback Message -->
       <div id="feedback" class="text-center py-2 min-h-[40px]"></div>
      </div><!-- Success Section (Hidden by default) -->
      <div id="success-section" class="hidden mt-6 text-center">
       <div class="bg-emerald-900/50 border-2 border-emerald-500 rounded-xl p-5">
        <div class="text-4xl mb-2">
         🎉
        </div>
        <p id="success-message" class="text-emerald-400 text-lg font-bold mb-4" style="font-family: 'Nunito', sans-serif;">Correct! You cracked the code!</p><a id="download-btn" href="DNA_Report_Victor_Graves_Confidential.pdf" download="next-clue.pdf" class="inline-flex items-center gap-2 bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-6 py-3 rounded-xl font-bold transition-all hover:scale-105 pulse-glow" style="font-family: 'Nunito', sans-serif;">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
         </svg><span id="download-btn-text">Download Next Clue</span> </a>
       </div>
      </div>
     </div><!-- Footer Hint -->
     <p class="text-center text-slate-500 text-sm mt-4" style="font-family: 'Nunito', sans-serif;">💡 Hint: Think about what the words mean backwards!</p>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      page_title: 'Scavenger Hunt',
      clue_label: 'Clue #1',
      clue_text: 'I AM AND IN REVERSE',
      success_message: 'Correct! You cracked the code!',
      download_button_text: 'Download Next Clue',
      background_color: '#1e3a5f',
      card_color: '#1e293b',
      text_color: '#e2e8f0',
      accent_color: '#fbbf24',
      button_color: '#10b981'
    };

    const CORRECT_ANSWER = '\u0044\u004E\u0041';

    // DOM Elements
    const answerInput = document.getElementById('answer-input');
    const submitBtn = document.getElementById('submit-btn');
    const feedback = document.getElementById('feedback');
    const successSection = document.getElementById('success-section');
    const confettiContainer = document.getElementById('confetti-container');

    // Check answer
    function checkAnswer() {
      const userAnswer = answerInput.value.trim().toUpperCase();
      
      if (!userAnswer) {
        showFeedback('Please enter an answer!', 'warning');
        return;
      }
      
      if (userAnswer === CORRECT_ANSWER) {
        showFeedback('', 'success');
        successSection.classList.remove('hidden');
        answerInput.disabled = true;
        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
        createConfetti();
      } else {
        showFeedback('Not quite... Try again! 🤔', 'error');
        answerInput.classList.add('shake');
        setTimeout(() => answerInput.classList.remove('shake'), 500);
      }
    }

    // Show feedback message
    function showFeedback(message, type) {
      feedback.innerHTML = '';
      if (!message) return;
      
      const colors = {
        success: 'text-emerald-400',
        error: 'text-rose-400',
        warning: 'text-amber-400'
      };
      
      feedback.innerHTML = `<span class="${colors[type]} font-semibold" style="font-family: 'Nunito', sans-serif;">${message}</span>`;
    }

    // Create confetti celebration
    function createConfetti() {
      const colors = ['#fbbf24', '#10b981', '#f43f5e', '#3b82f6', '#a855f7'];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + '%';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
          confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
          confettiContainer.appendChild(confetti);
          
          setTimeout(() => confetti.remove(), 4000);
        }, i * 50);
      }
    }

    // Event listeners
    submitBtn.addEventListener('click', checkAnswer);
    answerInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkAnswer();
    });

    // Element SDK initialization
    async function onConfigChange(config) {
      document.getElementById('page-title').textContent = config.page_title || defaultConfig.page_title;
      document.getElementById('clue-label').textContent = config.clue_label || defaultConfig.clue_label;
      document.getElementById('clue-text').textContent = config.clue_text || defaultConfig.clue_text;
      document.getElementById('success-message').textContent = config.success_message || defaultConfig.success_message;
      document.getElementById('download-btn-text').textContent = config.download_button_text || defaultConfig.download_button_text;
      
      // Apply colors
      const wrapper = document.getElementById('app-wrapper');
      const bgColor = config.background_color || defaultConfig.background_color;
      wrapper.style.background = `linear-gradient(135deg, ${bgColor} 0%, #0d1b2a 50%, #1b263b 100%)`;
      
      document.getElementById('page-title').style.color = config.accent_color || defaultConfig.accent_color;
      document.getElementById('clue-label').style.backgroundColor = config.accent_color || defaultConfig.accent_color;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => window.elementSdk.setConfig({ background_color: value })
            },
            {
              get: () => config.card_color || defaultConfig.card_color,
              set: (value) => window.elementSdk.setConfig({ card_color: value })
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => window.elementSdk.setConfig({ text_color: value })
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (value) => window.elementSdk.setConfig({ accent_color: value })
            },
            {
              get: () => config.button_color || defaultConfig.button_color,
              set: (value) => window.elementSdk.setConfig({ button_color: value })
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || 'Nunito',
            set: (value) => window.elementSdk.setConfig({ font_family: value })
          },
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['page_title', config.page_title || defaultConfig.page_title],
          ['clue_label', config.clue_label || defaultConfig.clue_label],
          ['clue_text', config.clue_text || defaultConfig.clue_text],
          ['success_message', config.success_message || defaultConfig.success_message],
          ['download_button_text', config.download_button_text || defaultConfig.download_button_text]
        ])
      });
    }
  </script>
